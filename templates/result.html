<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result</title>
</head>
<body>
    <h1>{{ message }}</h1>
    {% if result_image %}
        <img src="{{ url_for('static', filename='../uploads/' + result_image) }}" alt="Encoded Image">
    {% endif %}
    {% if result_message %}
        <p><strong>Hidden Message:</strong> {{ result_message }}</p>
    {% endif %}
    <br><a href="/">Go back</a>
</body>
</html>
